name: Build Android APK

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android-app/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Signed Release APK
        run: |
          cd android-app
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp android-app/app/build/outputs/apk/release/app-release.apk android-app/app/build/outputs/apk/release/airmini-sync-${{ github.ref_name }}.apk

      - name: Determine if Prerelease
        id: prerelease_check
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/release/airmini-sync-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
